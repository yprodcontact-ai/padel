<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Padel · App design</title>
<style>
  html, body { margin: 0; padding: 0; background: #E8E8E8; font-family: -apple-system, system-ui, sans-serif; }
  * { box-sizing: border-box; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="screens/shared.jsx"></script>
<script type="text/babel" src="screens/home.jsx"></script>
<script type="text/babel" src="screens/find.jsx"></script>
<script type="text/babel" src="screens/messages.jsx"></script>
<script type="text/babel" src="screens/notifications.jsx"></script>
<script type="text/babel" src="screens/profile.jsx"></script>
<script type="text/babel" src="screens/match.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#19A66B"
}/*EDITMODE-END*/;

function Phone({ children }) {
  // 393×852 is the iPhone 15/16 Pro logical size
  return (
    <IOSDevice width={393} height={852}>
      {children}
    </IOSDevice>
  );
}

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  React.useEffect(() => {
    document.documentElement.style.setProperty('--accent', tweaks.accent);
  }, [tweaks.accent]);

  return (
    <>
      <DesignCanvas>
        <DCSection id="anchor" title="Référence" subtitle="Maquette d'origine fournie par Yannis">
          <DCArtboard id="home" label="01 · Accueil" width={393} height={852}>
            <Phone><ScreenHome /></Phone>
          </DCArtboard>
        </DCSection>

        <DCSection id="find" title="Trouver une partie" subtitle="Liste verticale, filtres niveau + distance">
          <DCArtboard id="find" label="02 · Recherche" width={393} height={852}>
            <Phone><ScreenFind /></Phone>
          </DCArtboard>
        </DCSection>

        <DCSection id="messages" title="Messages" subtitle="Conversations de partie + DM joueurs">
          <DCArtboard id="msg-list" label="03a · Liste" width={393} height={852}>
            <Phone><ScreenMessagesList /></Phone>
          </DCArtboard>
          <DCArtboard id="msg-chat" label="03b · Discussion" width={393} height={852}>
            <Phone><ScreenMessagesChat /></Phone>
          </DCArtboard>
        </DCSection>

        <DCSection id="notifs" title="Notifications" subtitle="Joueur rejoint · Rappel match · Annulation">
          <DCArtboard id="notifs" label="04 · Notifications" width={393} height={852}>
            <Phone><ScreenNotifications /></Phone>
          </DCArtboard>
        </DCSection>

        <DCSection id="profile" title="Profil joueur" subtitle="Yannis — niveau, position, bio, clubs favoris">
          <DCArtboard id="profile" label="05 · Profil" width={393} height={852}>
            <Phone><ScreenProfile /></Phone>
          </DCArtboard>
        </DCSection>

        <DCSection id="match" title="Page Partie" subtitle="2 états : 1 place dispo · complet">
          <DCArtboard id="m-open" label="06a · 1 place" width={393} height={852}>
            <Phone><ScreenMatch state="open" /></Phone>
          </DCArtboard>
          <DCArtboard id="m-full" label="06b · Complet" width={393} height={852}>
            <Phone><ScreenMatch state="full" /></Phone>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="Tweaks">
        <TweakSection title="Apparence">
          <TweakColor label="Couleur d'accent" value={tweaks.accent}
            onChange={(v) => setTweak('accent', v)} />
          <div style={{ fontSize: 12, color: '#8E8E93', marginTop: 6 }}>
            Utilisée pour les indicateurs (terrain réservé, points unread, score).
          </div>
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
